<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumanth | 3D Architect</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="custom-cursor"></div>

    <div id="canvas-container"></div>

    <div id="paper-container">
        <div class="paper-half" id="paper-top">
            <div class="japanese-text">
                <h1>世界を創る者</h1> <h2>三次元の建築家</h2> <h3>スマンス</h3> </div>
        </div>
        
        <div class="paper-half" id="paper-bottom">
            <div class="instructions">
                <p>[ CLICK & DRAG TO SLICE ]</p>
            </div>
        </div>

        <div id="slice-flash"></div>
        <div id="embers-container"></div>
    </div>

    <div id="void-content">
        <h2 id="continue-text">続く / CONTINUE</h2>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
