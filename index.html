<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sumanth.D</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,400;1,500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0a0906;
  color:#eee;
  overflow-x:hidden;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(60px,10vw,140px);
  font-style:italic;
}

/* SCROLL SECTION */
.section{
  height:200vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* BUTTON */
.enter-btn{
  padding:14px 28px;
  border:1px solid rgba(255,255,255,.2);
  cursor:pointer;
  letter-spacing:.2em;
}

/* INK MODE */
.ink-system{
  position:fixed;
  inset:0;
  background:#f3ead7;
  display:none;
  overflow-y:auto;
}

.ink-system.active{
  display:block;
}

/* HEADER */
.ink-header{
  text-align:center;
  padding:80px 20px;
}

.ink-title{
  font-size:clamp(40px,6vw,100px);
  font-family:'Cormorant Garamond',serif;
}

/* VAULT */
.ink-vault{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

/* CARD */
.ink-card{
  background:rgba(0,0,0,.05);
  padding:40px;
  margin-bottom:40px;
  border:1px solid rgba(0,0,0,.2);
  opacity:0;
  transform:translateY(80px);
  transition:all 1s ease;
  cursor:pointer;
}

.ink-card.show{
  opacity:1;
  transform:translateY(0);
}

.ink-card:hover{
  transform:translateY(-5px);
}

/* EXPANDED */
.ink-card.expanded{
  background:#fff;
  transform:scale(1.02);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal.active{
  display:flex;
}

.modal-content{
  background:#fff;
  padding:40px;
  max-width:600px;
  color:#000;
}

.close{
  margin-top:20px;
  cursor:pointer;
  color:red;
}
</style>
</head>

<body>

<div class="hero">su m .D©</div>

<div class="section">
  <div class="enter-btn" onclick="enterInk()">ENTER</div>
</div>

<!-- INK MODE -->
<div class="ink-system" id="ink">

  <div class="ink-header">
    <div class="ink-title">KAKUSEI</div>
    <p>scroll to explore</p>
  </div>

  <div class="ink-vault" id="vault"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>

/* DATA */
const works = [
  {title:"Fudo Myoo",desc:"Sanctum of fire."},
  {title:"Midea Canada",desc:"Industry work."},
  {title:"Kohaku",desc:"Koi study."},
  {title:"KD Displays",desc:"Retail design."},
  {title:"Onibi",desc:"Lantern study."},
  {title:"Investohome",desc:"Brand identity."},
  {title:"Iron Garden",desc:"Environment study."}
];

/* BUILD */
const vault = document.getElementById('vault');

works.forEach((w,i)=>{
  const card = document.createElement('div');
  card.className='ink-card';
  card.innerHTML=`
    <h2>${w.title}</h2>
    <p>${w.desc}</p>
  `;
  card.onclick=()=>openModal(w);
  vault.appendChild(card);
});

/* SCROLL REVEAL */
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add('show');
    }
  });
});

document.querySelectorAll('.ink-card').forEach(c=>observer.observe(c));

/* ENTER */
function enterInk(){
  document.getElementById('ink').classList.add('active');
}

/* MODAL */
function openModal(work){
  const modal = document.getElementById('modal');
  const content = document.getElementById('modalContent');

  content.innerHTML=`
    <h2>${work.title}</h2>
    <p>${work.desc}</p>
    <div class="close" onclick="closeModal()">close</div>
  `;

  modal.classList.add('active');
}

function closeModal(){
  document.getElementById('modal').classList.remove('active');
}

</script>

</body>
</html>
